[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "swcstudio"
version = "0.1.0"
description = "Modular SWC processing toolkit with shared core for CLI and GUI"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "SWC-Dash Contributors"}]
dependencies = [
  # Core scientific stack
  "numpy>=1.24",
  "pandas>=2.0",
  "scipy>=1.11",
  "morphio>=3.3",
  "neurom>=4.0",
  # Auto-typing engine (v9 ML pipeline) — Stage 1 + Stage 2 sklearn
  # ensembles, Stage 2b GraphSAGE GNN. Pinned to the 1.5.x series the
  # bundled pickles were trained on; sklearn does not guarantee
  # cross-minor pickle compatibility.
  "scikit-learn>=1.5,<1.6",
  "torch>=2.1",
  "torch-geometric>=2.6",
  # GUI — the desktop app is the primary user surface, so PySide6 and
  # the visualization stack are required dependencies.
  "PySide6>=6.6",
  "pyqtgraph>=0.14",
  "vispy>=0.14"
]

[project.optional-dependencies]
build = [
  "PyInstaller>=6.11"
]
docs = [
  "sphinx>=8.2",
  "pydata-sphinx-theme>=0.16",
  "myst-parser>=3.0"
]
# Developer/maintainer extras — packaging tools + Sphinx for the docs.
# Regular end users do not need this.
all = [
  "PyInstaller>=6.11",
  "sphinx>=8.2",
  "pydata-sphinx-theme>=0.16",
  "myst-parser>=3.0"
]

[project.scripts]
swcstudio = "swcstudio.cli.cli:main"
swcstudio-gui = "swcstudio.gui.main:main"

[tool.setuptools.packages.find]
include = ["swcstudio*"]

[tool.setuptools.package-data]
# Models are NOT shipped in the pip wheel. They're downloaded from
# GitHub Releases on first use by swcstudio.core.updater (Pattern B).
# Keeping the wheel lean (~5 MB instead of ~65 MB) means
# `pip install --upgrade swcstudio` is fast for code-only updates.
# The bundled .app distribution still ships models inside the bundle —
# see packaging/MODULAR_BUILD.md.
"swcstudio" = []
