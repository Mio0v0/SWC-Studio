name: Fresh Install Smoke

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build and inspect distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify dependencies, configurations, and models
        run: |
          python scripts/verify_distribution.py dist/*.whl dist/*.tar.gz

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: swcstudio-wheel
          path: dist/*.whl
          if-no-files-found: error

  install-smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: '3.10'
            venv_python: .smoke/bin/python
          - os: ubuntu-latest
            python: '3.11'
            venv_python: .smoke/bin/python
          - os: ubuntu-latest
            python: '3.12'
            venv_python: .smoke/bin/python
          - os: windows-latest
            python: '3.12'
            venv_python: .smoke/Scripts/python.exe
          - os: macos-latest
            python: '3.12'
            venv_python: .smoke/bin/python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: swcstudio-wheel
          path: wheelhouse

      - name: Install wheel into an empty virtual environment
        shell: bash
        run: |
          python -m venv .smoke
          PY="${{ matrix.venv_python }}"
          WHEEL="$(find "$GITHUB_WORKSPACE/wheelhouse" -name '*.whl' -print -quit)"
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install "$WHEEL"

      - name: Verify installed runtime and deserialize all models
        shell: bash
        run: |
          PY="$GITHUB_WORKSPACE/${{ matrix.venv_python }}"
          cd "$RUNNER_TEMP"
          "$PY" -m swcstudio.cli.cli doctor --json

      - name: Smoke-test GUI import and auto-label inference
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          PY="$GITHUB_WORKSPACE/${{ matrix.venv_python }}"
          cp tests/fixtures/single-soma.swc "$RUNNER_TEMP/install-smoke.swc"
          cd "$RUNNER_TEMP"
          "$PY" -c "from PySide6.QtWidgets import QApplication; import swcstudio.gui.main; app = QApplication([]); print('gui-ok')"
          "$PY" -m swcstudio.cli.cli auto-label "$RUNNER_TEMP/install-smoke.swc" > auto-label.json
          "$PY" -c "import json; data=json.load(open('auto-label.json', encoding='utf-8')); print('auto-label-ok', data['nodes_total'], data['cell_type'])"
