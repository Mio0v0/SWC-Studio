name: Fresh Install Smoke

on:
  push:
    branches:
      - '**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: install-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheel:
    name: Build and inspect distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Build wheel and source distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify dependencies, configurations, and models
        run: |
          python scripts/verify_distribution.py dist/*.whl dist/*.tar.gz

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: swcstudio-wheel
          path: dist/*.whl
          if-no-files-found: error

  install-smoke:
    name: ${{ matrix.os }} / Python ${{ matrix.python }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python:
          - '3.10'
          - '3.11'
          - '3.12'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: swcstudio-wheel
          path: wheelhouse

      - name: Install wheel into an empty virtual environment
        shell: bash
        run: |
          python -m venv .smoke
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY="$GITHUB_WORKSPACE/.smoke/Scripts/python.exe"
          else
            PY="$GITHUB_WORKSPACE/.smoke/bin/python"
          fi
          WHEEL="$(find "$GITHUB_WORKSPACE/wheelhouse" -name '*.whl' -print -quit)"
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install "$WHEEL"
          "$PY" -m pip check

      - name: Verify installed runtime and deserialize all models
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY="$GITHUB_WORKSPACE/.smoke/Scripts/python.exe"
          else
            PY="$GITHUB_WORKSPACE/.smoke/bin/python"
          fi
          cd "$RUNNER_TEMP"
          "$PY" -m swcstudio.cli.cli doctor --json

      - name: Smoke-test GUI import and auto-label inference
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            PY="$GITHUB_WORKSPACE/.smoke/Scripts/python.exe"
            GUI="$GITHUB_WORKSPACE/.smoke/Scripts/swcstudio-gui.exe"
          else
            PY="$GITHUB_WORKSPACE/.smoke/bin/python"
            GUI="$GITHUB_WORKSPACE/.smoke/bin/swcstudio-gui"
          fi
          cp tests/fixtures/single-soma.swc "$RUNNER_TEMP/install-smoke.swc"
          cd "$RUNNER_TEMP"
          test -f "$GUI"
          "$PY" -c "from PySide6.QtWidgets import QApplication; import swcstudio.gui.main; app = QApplication([]); print('gui-ok')"
          "$PY" -m swcstudio.cli.cli auto-label "$RUNNER_TEMP/install-smoke.swc" > auto-label.json
          "$PY" -c "import json; data=json.load(open('auto-label.json', encoding='utf-8')); print('auto-label-ok', data['nodes_total'], data['cell_type'])"
          "$PY" -c "from swcstudio.core.auto_typing.types import BatchOptions; from swcstudio.gui.auto_typing_workers import _AutoLabelFileWorker; result=_AutoLabelFileWorker(1, '$RUNNER_TEMP/install-smoke.swc', BatchOptions(), None)._run_isolated(); print('isolated-auto-label-ok', result.nodes_total)"
          "$PY" -c "from pathlib import Path; from swcstudio.core.swc_io import parse_swc_text_preserve_tokens; from swcstudio.gui.auto_typing_workers import _TypeSuspicionWorker; df=parse_swc_text_preserve_tokens(Path('$RUNNER_TEMP/install-smoke.swc').read_text()); print('isolated-gui-inference-ok', len(_TypeSuspicionWorker(1, df)._run_isolated()))"
